<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>First Browser Jailbreak</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #0a0a2e 0%, #050510 50%, #000000 100%);
            color: white;
            overflow: hidden;
        }

        body::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.8) 100%);
            pointer-events: none;
            z-index: 2;
        }

        #rainCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        .main-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 38px;
            padding: 40px 25px;
            width: 85%;
            max-width: 360px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
            z-index: 10;
            position: relative;
            
            /* Анимация всплытия снизу вверх */
            opacity: 0;
            transform: translateY(100px);
            animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .verified-badge {
            display: inline-flex;
            align-items: center;
            background: rgba(50, 215, 75, 0.1);
            color: #32d74b;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 15px;
            border: 1px solid rgba(50, 215, 75, 0.2);
        }

        h1 {
            font-size: 1.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: -0.8px;
            line-height: 1.1;
            margin-bottom: 5px;
            background: linear-gradient(to bottom, #ffffff 0%, #a1a1a1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .server-status { 
            font-size: 11px; 
            color: #32d74b; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 5px; 
            margin-bottom: 20px;
        }
        
        .status-dot { 
            width: 6px; 
            height: 6px; 
            background: #32d74b; 
            border-radius: 50%; 
            animation: pulse 1.5s infinite; 
        }
        
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        /* Вернул блок с Target и Exploit */
        .device-info {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 24px;
            padding: 20px;
            margin: 20px 0;
            font-family: 'SF Mono', monospace;
            font-size: 12px;
            color: #fff;
            text-align: left;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .info-line { margin-bottom: 8px; display: flex; justify-content: space-between; }
        .info-line span { color: #555; }
        .green-val { color: #32d74b; font-weight: bold; }

        .btn-jailbreak {
            background: #ffffff;
            color: #000;
            border: none;
            padding: 18px 0;
            width: 100%;
            font-size: 19px;
            font-weight: 700;
            border-radius: 18px;
            text-decoration: none;
            display: block;
            transition: transform 0.2s;
            margin-bottom: 15px;
        }
        .btn-jailbreak:active { transform: scale(0.96); }

        .footer { 
            margin-top: 15px; 
            font-size: 10px; 
            color: #444; 
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <canvas id="rainCanvas"></canvas>
    
    <div class="main-card">
        <div class="verified-badge">✓ Verified Repository</div>
        <h1>First Browser Jailbreak</h1>
        <div class="server-status">
            <div class="status-dot"></div> Exploit Servers: Online
        </div>

        <div class="device-info">
            <div class="info-line"><span>Target:</span> <span class="green-val">iOS 15.0 - 26.x</span></div>
            <div class="info-line"><span>Method:</span> <span class="green-val">WebKit Exploit</span></div>
            <div class="info-line"><span>Safety:</span> <span class="green-val">100% Secure</span></div>
        </div>
        
        <a href="second.html" class="btn-jailbreak">Jailbreak</a>

        <div class="footer">
            Original code by <b>neonmodder123</b><br>
            © 2026 Repo made by Vitya
        </div>
    </div>

    <script>
        const canvas = document.getElementById('rainCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, drops;
        
        function initRain() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            drops = Array.from({length: Math.floor(width/12)}, () => ({
                x: Math.random() * width, y: Math.random() * height,
                len: Math.random() * 30 + 15, speed: Math.random() * 2 + 2, op: Math.random() * 0.12 + 0.05
            }));
        }
        
        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.fillRect(0, 0, width, height);
            ctx.strokeStyle = '#1ad2dc';
            ctx.lineWidth = 1;
            ctx.lineCap = 'round';
            drops.forEach(d => {
                ctx.globalAlpha = d.op;
                ctx.beginPath(); 
                ctx.moveTo(d.x, d.y); 
                ctx.lineTo(d.x, d.y + d.len); 
                ctx.stroke();
                d.y += d.speed; 
                if (d.y > height) d.y = -d.len;
            });
            requestAnimationFrame(draw);
        }
        
        window.addEventListener('resize', initRain); 
        initRain(); 
        draw();
    </script>
</body>
</html>
