<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>i26 | Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .ios-card {
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            width: 90%;
            max-width: 380px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .jailbreak-btn {
            background-color: #fff;
            color: #000;
            font-weight: 700;
            padding: 18px;
            border-radius: 20px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s ease;
            margin-top: 30px;
        }
        .jailbreak-btn:active {
            transform: scale(0.95);
            background-color: #ddd;
        }
        .icon-box {
            background: linear-gradient(135deg, #222, #111);
            width: 80px;
            height: 80px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            border: 1px solid rgba(255,255,255,0.05);
        }
    </style>
</head>
<body>

    <div class="ios-card">
        <!-- Icon -->
        <div class="icon-box">
            <i data-lucide="shield" class="w-10 h-10 text-white"></i>
        </div>

        <!-- Text -->
        <h1 class="text-xs font-mono tracking-[0.5em] text-indigo-500 uppercase mb-2">Project i26</h1>
        <h2 class="text-4xl font-black tracking-tight mb-4 uppercase">Aurora</h2>
        
        <p class="text-sm text-white/50 leading-relaxed px-2">
            The most advanced untethered exploit for iOS 26. Stable, secure, and ready for deployment.
        </p>

        <!-- Button -->
        <a href="second.html" class="block no-underline">
            <button class="jailbreak-btn">
                <i data-lucide="zap" class="w-5 h-5 fill-current"></i>
                Jailbreak
            </button>
        </a>

        <!-- Stats -->
        <div class="mt-8 pt-8 border-t border-white/5 flex justify-around text-[10px] text-white/30 uppercase tracking-widest font-mono">
            <span>v1.0.4</span>
            <span class="opacity-50">Active</span>
            <span>A19/A20</span>
        </div>
    </div>

    <!-- Footer Credits -->
    <div class="fixed bottom-8 w-full text-center space-y-2 pointer-events-none">
        <p class="text-[9px] text-white/20 tracking-widest uppercase">
            Original respring code by neonmodder123
        </p>
        <p class="text-[9px] text-white/10 tracking-[0.3em] uppercase">
            Repo made by AI Google Studio
        </p>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
