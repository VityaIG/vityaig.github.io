<style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: radial-gradient(circle, #1a1a1a, #000000);
            color: white;
            text-align: center;
        }

        .container {
            padding: 20px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            letter-spacing: -1px;
            text-shadow: 0 0 20px rgba(255,255,255,0.1); /* Легкое свечение текста */
        }

        p {
            color: #888;
            margin-bottom: 30px;
        }

        .btn {
            background: #007aff;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 12px;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-block;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 122, 255, 0.3); /* Тень кнопки */
        }

        /* Эффект при наведении (или длинном тапе на iPhone) */
        .btn:hover {
            background: #0084ff;
            box-shadow: 0 0 25px rgba(0, 122, 255, 0.6); /* Свечение */
            transform: translateY(-2px);
        }

        .btn:active {
            transform: scale(0.95);
            background: #0056b3;
        }
    </style>
