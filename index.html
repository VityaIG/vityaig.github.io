<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WEB-BREAK 26</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'%3E%3Crect width='18' height='11' x='3' y='11' rx='2' ry='2'/%3E%3Cpath d='M7 11V7a5 5 0 0 1 10 0v4'/%3E%3C/svg%3E">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }
        #fireworks-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        .ios-card {
            background: rgba(10, 10, 10, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 40px;
            width: 90%;
            max-width: 400px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            z-index: 10;
        }
        .ios-button {
            background: #fff;
            color: #000;
            font-weight: 700;
            padding: 18px 36px;
            border-radius: 20px;
            font-size: 17px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(255,255,255,0.1);
        }
        .ios-button:active {
            transform: scale(0.95);
            background: #e0e0e0;
        }
        .shimmer {
            background: linear-gradient(90deg, #fff, #888, #222, #888, #fff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: textShimmer 5s linear infinite;
        }
        @keyframes textShimmer {
            to { background-position: 200% center; }
        }
    </style>
</head>
<body>
    <canvas id="fireworks-canvas"></canvas>

    <div id="main-card" class="ios-card space-y-10">
        <div class="space-y-3">
            <h1 class="text-4xl font-bold tracking-tight shimmer">WEB-BREAK</h1>
            <p class="text-white/40 text-sm font-medium tracking-widest uppercase">Version 2.6.4-Stable</p>
        </div>

        <div class="py-10">
            <button id="jailbreak-btn" class="ios-button w-full">Jailbreak</button>
        </div>

        <div class="space-y-1">
            <p class="text-[10px] text-indigo-400 font-bold tracking-widest uppercase opacity-60">Supported: iOS 15.0 - 18.0</p>
            <p class="text-[9px] text-white/20 font-medium">© 2026 PROJECT-NEON TEAM</p>
        </div>
    </div>

    <div class="fixed bottom-6 right-6 z-50 flex items-center gap-3">
        <div id="color-toast" class="opacity-0 pointer-events-none transition-all duration-300 font-bold uppercase text-[10px] tracking-widest">White</div>
        <button id="fireworks-color-btn" class="hidden p-3 bg-white/5 hover:bg-white/10 border border-white/10 rounded-full transition-all group backdrop-blur-md">
            <i data-lucide="sparkles" class="w-5 h-5 text-white/40 group-hover:text-white transition-colors"></i>
        </button>
        <button id="hide-ui-btn" class="p-3 bg-white/5 hover:bg-white/10 border border-white/10 rounded-full transition-all group backdrop-blur-md">
            <i id="hide-ui-icon" data-lucide="eye" class="w-5 h-5 text-white/40 group-hover:text-white transition-colors"></i>
        </button>
    </div>

    <script>
        lucide.createIcons();

        // Fireworks Logic
        const canvas = document.getElementById('fireworks-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let currentFireworkColor = 'rgba(255, 255, 255, 0.8)';
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.velocity = {
                    x: (Math.random() - 0.5) * 8,
                    y: (Math.random() - 0.5) * 8
                };
                this.alpha = 1;
                this.friction = 0.95;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 2, 0, Math.PI * 2, false);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.restore();
            }
            update() {
                this.velocity.x *= this.friction;
                this.velocity.y *= this.friction;
                this.x += this.velocity.x;
                this.y += this.velocity.y;
                this.alpha -= 0.01;
            }
        }

        class Firework {
            constructor() {
                this.x = Math.random() * width;
                this.y = height;
                this.targetY = Math.random() * (height * 0.5);
                this.velocity = { x: 0, y: -Math.random() * 5 - 5 };
                this.particles = [];
                this.exploded = false;
                this.color = currentFireworkColor;
            }
            draw() {
                if (!this.exploded) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.fill();
                } else {
                    this.particles.forEach(p => p.draw());
                }
            }
            update() {
                if (!this.exploded) {
                    this.y += this.velocity.y;
                    if (this.y <= this.targetY) {
                        this.exploded = true;
                        for (let i = 0; i < 25; i++) {
                            this.particles.push(new Particle(this.x, this.y, this.color));
                        }
                    }
                } else {
                    this.particles.forEach(p => p.update());
                    this.particles = this.particles.filter(p => p.alpha > 0);
                }
            }
        }

        let fireworks = [];
        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, width, height);
            if (Math.random() < 0.05) fireworks.push(new Firework());
            fireworks.forEach((fw, i) => {
                fw.update();
                fw.draw();
                if (fw.exploded && fw.particles.length === 0) fireworks.splice(i, 1);
            });
            requestAnimationFrame(animate);
        }
        animate();

        // UI Logic
        const colorBtn = document.getElementById('fireworks-color-btn');
        const hideBtn = document.getElementById('hide-ui-btn');
        const mainCard = document.getElementById('main-card');
        const toast = document.getElementById('color-toast');
        const icon = document.getElementById('hide-ui-icon');
        const jbBtn = document.getElementById('jailbreak-btn');

        let isHidden = false;
        hideBtn.onclick = () => {
            isHidden = !isHidden;
            mainCard.style.opacity = isHidden ? '0' : '1';
            mainCard.style.transform = isHidden ? 'scale(0.9) translateY(20px)' : 'scale(1) translateY(0)';
            mainCard.style.pointerEvents = isHidden ? 'none' : 'auto';
            icon.setAttribute('data-lucide', isHidden ? 'eye-off' : 'eye');
            lucide.createIcons();
            colorBtn.classList.toggle('hidden', !isHidden);
            toast.classList.add('opacity-0');
        };

        const fireworkColors = [
            { val: 'rgba(255, 255, 255, 0.8)', name: 'White' },
            { val: 'rgba(99, 102, 241, 0.8)', name: 'Indigo' },
            { val: 'rgba(239, 68, 68, 0.8)', name: 'Red' },
            { val: 'rgba(34, 197, 94, 0.8)', name: 'Green' },
            { val: 'rgba(234, 179, 8, 0.8)', name: 'Yellow' },
            { val: 'rgba(168, 85, 247, 0.8)', name: 'Purple' }
        ];
        let colorIdx = 0;

        colorBtn.onclick = () => {
            colorIdx = (colorIdx + 1) % fireworkColors.length;
            const selected = fireworkColors[colorIdx];
            currentFireworkColor = selected.val;
            
            const btnIcon = colorBtn.querySelector('svg') || colorBtn.querySelector('i');
            if (btnIcon) btnIcon.style.color = currentFireworkColor;

            toast.innerText = selected.name;
            toast.style.color = selected.val;
            toast.className = "opacity-100 pointer-events-none transition-all duration-300 font-bold uppercase text-[10px] tracking-widest translate-x-0";
            
            setTimeout(() => {
                toast.className = "opacity-0 pointer-events-none transition-all duration-300 font-bold uppercase text-[10px] tracking-widest translate-x-4";
            }, 1000);
        };

        jbBtn.onclick = () => {
            jbBtn.innerText = "Exploiting...";
            jbBtn.style.opacity = "0.5";
            jbBtn.disabled = true;
            setTimeout(() => { window.location.href = 'second.html'; }, 1200);
        };
    </script>
</body>
</html>
