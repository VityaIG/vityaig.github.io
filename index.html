<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jailbreak Tool</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            /* Анимированный фон */
            background: linear-gradient(135deg, #000000 0%, #0a0a2e 50%, #000000 100%);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .main-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 40px 20px;
            width: 85%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 2.5rem;
            margin: 0 0 10px 0;
            letter-spacing: -1px;
            background: linear-gradient(to bottom, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .device-info {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 15px;
            margin: 20px 0;
            font-family: monospace;
            font-size: 13px;
            color: #00ff00;
            text-align: left;
        }

        .info-line { margin-bottom: 5px; }
        .info-line span { color: #888; }

        .btn-jailbreak {
            background: #ffffff;
            color: #000;
            border: none;
            padding: 18px 0;
            width: 100%;
            font-size: 18px;
            font-weight: 700;
            border-radius: 15px;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
            margin-top: 10px;
            box-shadow: 0 10px 20px rgba(255, 255, 255, 0.1);
        }

        .btn-jailbreak:active {
            transform: scale(0.97);
            background: #ccc;
        }

        .footer-text {
            font-size: 11px;
            color: #444;
            margin-top: 25px;
        }
    </style>
</head>
<body>

    <div class="main-card">
        <h1>Jailbreak</h1>
        <p style="color: #888; font-size: 14px;">Stable release for iOS 15.0 - 18.x</p>

        <div class="device-info">
            <div class="info-line"><span>Device:</span> iPhone (Mobile)</div>
            <div class="info-line"><span>Status:</span> Ready to exploit</div>
            <div class="info-line"><span>Connection:</span> Encrypted</div>
        </div>
        
        <a href="second.html" class="btn-jailbreak">Jailbreak</a>

        <div class="footer-text">
            Original respring code developed by <b>neonmodder123</b><br>
            All rights reserved. 2026.
        </div>
    </div>

</body>
</html>
