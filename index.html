        #rainCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; display: none; }

        .main-card {

            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 59, 48, 0.2);

        @keyframes fadeIn {
            to {

        .verified-badge {
            display: inline-flex;
            align-items: center;
            background: rgba(255, 59, 48, 0.1);
            color: #ff3b30;
            padding: 5px 12px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 59, 48, 0.2);

        h1 {
            font-size: 1.5rem;
            font-weight: 900;

            justify-content: center; 
            align-items: center; 
            gap: 5px; 
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .status-dot { 
            width: 5px; 
            height: 5px; 
            background: #ff3b30; 
            border-radius: 50%; 
            animation: pulse 1.5s infinite; 
            box-shadow: 0 0 5px #ff3b30;
        }
        
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .device-info {
            background: rgba(255, 59, 48, 0.05);
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
            font-family: 'SF Mono', monospace;
            font-size: 11px;
            color: #fff;
            text-align: left;
            border: 1px solid rgba(255, 59, 48, 0.1);

        .red-val { color: #ff3b30; font-weight: bold; }

        .btn-jailbreak {

            color: #ff3b30;
            border: 1px solid #ff3b30;
            padding: 16px 0;
            width: 100%;
            font-size: 16px;
            font-weight: 700;
            border-radius: 4px;
            text-decoration: none;
            display: block;
            text-transform: uppercase;
            letter-spacing: 2px;

        .btn-jailbreak:hover {

            box-shadow: 0 0 15px rgba(255, 59, 48, 0.1);
        }

        .footer { 
            margin-top: 15px; 
            font-size: 9px; 
            color: #333; 
            line-height: 1.4;
