<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exploiting...</title>
    <style>
        body {
            background-color: black;
            color: #00ff00; /* Хакерский зеленый */
            font-family: monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .terminal-text {
            width: 80%;
            text-align: left;
            white-space: pre-wrap;
        }

        /* Анимация мигающего курсора */
        .cursor {
            display: inline-block;
            width: 10px;
            height: 20px;
            background: #00ff00;
            animation: blink 0.8s infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="terminal-text">
        [#] Starting exploit...
        [#] Fetching kernel offsets...
        [#] Bypassing PAC...
        [#] Root access granted.
        [#] Triggering Respring...
        <span class="cursor"></span>
    </div>

    </body>
</html>
