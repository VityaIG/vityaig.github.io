        }

        .terminal-container { width: 90%; max-width: 500px; padding: 20px; z-index: 10; }

            width: 100%; border: 1px solid #333; height: 10px; margin-bottom: 20px;

        }

        #console { font-size: 12px; height: 150px; overflow: hidden; }
        .line { margin-bottom: 5px; opacity: 0; animation: fadeIn 0.1s forwards; }
        @keyframes fadeIn { to { opacity: 1; } }

        /* Экран паники */
        #panic-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #ff3b30; font-size: 10px;
            overflow: hidden; padding: 10px; word-break: break-all; z-index: 100;
        }

        /* БЛОК АВТОРА (всегда сверху) */
        .credits {
            position: fixed; bottom: 20px; width: 100%; text-align: center;
            font-size: 10px; color: #444; z-index: 200; font-family: sans-serif;
        }
        .credits a { color: #1ad2dc; text-decoration: underline; }

        #respring-iframe { position: fixed; opacity: 0.01; pointer-events: none; }
